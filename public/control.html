<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Draft Widget Control</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    .status {
      margin-bottom: 20px;
      padding: 12px 16px;
      background: #1e1e1e;
      border-radius: 10px;
    }

    .section {
      margin-bottom: 20px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 14px 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: #2a2a2a;
      color: white;
    }

    button:hover {
      background: #3a3a3a;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .primary {
      background: #1d4ed8;
    }

    .danger {
      background: #b91c1c;
    }

    .active {
      outline: 3px solid #fff;
    }

    .note {
      color: #aaa;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Draft Widget Control</h1>

  <div class="status" id="currentState">Loading...</div>

  <div class="section">
    <div class="action-row">
      <button class="primary" onclick="setStatus('onClock')">ON THE CLOCK</button>
      <button class="danger" onclick="setStatus('picked')">THE PICK IS IN</button>
      <button onclick="returnToAuto()">RETURN TO AUTO</button>
    </div>
  </div>

  <div class="section">
    <div class="buttons" id="teamButtons"></div>
  </div>

  <div class="note">
    Tap a team, then tap a status button. Use RETURN TO AUTO when you want ESPN back in control.
  </div>

  <script>
    const teams = [
      "Arizona Cardinals",
      "Atlanta Falcons",
      "Baltimore Ravens",
      "Buffalo Bills",
      "Carolina Panthers",
      "Chicago Bears",
      "Cincinnati Bengals",
      "Cleveland Browns",
      "Dallas Cowboys",
      "Denver Broncos",
      "Detroit Lions",
      "Green Bay Packers",
      "Houston Texans",
      "Indianapolis Colts",
      "Jacksonville Jaguars",
      "Kansas City Chiefs",
      "Las Vegas Raiders",
      "Los Angeles Chargers",
      "Los Angeles Rams",
      "Miami Dolphins",
      "Minnesota Vikings",
      "New England Patriots",
      "New Orleans Saints",
      "New York Giants",
      "New York Jets",
      "Philadelphia Eagles",
      "Pittsburgh Steelers",
      "San Francisco 49ers",
      "Seattle Seahawks",
      "Tampa Bay Buccaneers",
      "Tennessee Titans",
      "Washington Commanders"
    ];

    let selectedTeam = "Las Vegas Raiders";
    let currentMode = "auto";

    const currentState = document.getElementById("currentState");
    const teamButtons = document.getElementById("teamButtons");

    function renderTeams() {
      teamButtons.innerHTML = "";
      teams.forEach((team) => {
        const btn = document.createElement("button");
        btn.textContent = team;
        if (team === selectedTeam) btn.classList.add("active");
        btn.onclick = () => {
          selectedTeam = team;
          renderTeams();
        };
        teamButtons.appendChild(btn);
      });
    }

    async function refreshState() {
      const res = await fetch("/api/control");
      const data = await res.json();
      currentMode = data.mode;
      selectedTeam = data.team || selectedTeam;

      currentState.textContent =
        currentMode === "manual"
          ? `MANUAL: ${data.team} — ${data.status === "onClock" ? "ON THE CLOCK" : "THE PICK IS IN"}`
          : "AUTO: Following ESPN feed";

      renderTeams();
    }

    async function setStatus(status) {
      await fetch("/api/control/manual", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          team: selectedTeam,
          status
        })
      });

      refreshState();
    }

    async function returnToAuto() {
      await fetch("/api/control/auto", {
        method: "POST"
      });

      refreshState();
    }

    refreshState();
    renderTeams();
  </script>
</body>
</html>
