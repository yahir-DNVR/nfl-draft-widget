<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>NFL Draft Widget</title>

  <link rel="preload" href="/fonts/AbolitionTest-Regular.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    @font-face {
      font-family: "Abolition";
      src: url("/fonts/AbolitionTest-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      font-family: "Abolition", "Arial Narrow", Impact, sans-serif;
    }

    .frame {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: transparent;
      overflow: hidden;
    }

    .widget {
      position: absolute;
      left: 0px;
      top: 927px;
      width: 482px;
      height: 82px;
      display: flex;
      align-items: stretch;
    }

    .status-box {
      background: #000;
      color: #fff;
      width: 338px;
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      transition: background 200ms ease, color 200ms ease;
    }

    .status-inner {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      font-family: "Abolition", "Arial Narrow", Impact, sans-serif;
      font-size: 48px;
      letter-spacing: 1px;
      line-height: 0.9;
      text-transform: uppercase;
      transform: translateY(-5px);
    }

    .logo-box {
      width: 144px;
      height: 82px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 200ms ease;
    }

    .logo-box img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      transform: scale(1.12);
      transform-origin: center center;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .pick-in-flash {
      animation: flash 0.45s ease-in-out 4;
    }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>

<body>
  <div class="frame">
    <div id="widget" class="widget">
      <div id="statusText" class="status-box">
        <div id="statusInner" class="status-inner">ON THE CLOCK</div>
      </div>
      <div id="logoBox" class="logo-box">
        <img id="teamLogo" src="https://a.espncdn.com/i/teamlogos/nfl/500/lv.png" alt="Team logo">
      </div>
    </div>
  </div>

  <script>
    const statusInner = document.getElementById("statusInner");
    const teamLogo = document.getElementById("teamLogo");
    const logoBox = document.getElementById("logoBox");
    const statusText = document.getElementById("statusText");
    const widget = document.getElementById("widget");

    const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${protocol}//${window.location.host}`);

    const logoMap = {
      "Arizona Cardinals": "ari",
      "Atlanta Falcons": "atl",
      "Baltimore Ravens": "bal",
      "Buffalo Bills": "buf",
      "Carolina Panthers": "car",
      "Chicago Bears": "chi",
      "Cincinnati Bengals": "cin",
      "Cleveland Browns": "cle",
      "Dallas Cowboys": "dal",
      "Denver Broncos": "den",
      "Detroit Lions": "det",
      "Green Bay Packers": "gb",
      "Houston Texans": "hou",
      "Indianapolis Colts": "ind",
      "Jacksonville Jaguars": "jax",
      "Kansas City Chiefs": "kc",
      "Las Vegas Raiders": "lv",
      "Los Angeles Chargers": "lac",
      "Los Angeles Rams": "lar",
      "Miami Dolphins": "mia",
      "Minnesota Vikings": "min",
      "New England Patriots": "ne",
      "New Orleans Saints": "no",
      "New York Giants": "nyg",
      "New York Jets": "nyj",
      "Philadelphia Eagles": "phi",
      "Pittsburgh Steelers": "pit",
      "San Francisco 49ers": "sf",
      "Seattle Seahawks": "sea",
      "Tampa Bay Buccaneers": "tb",
      "Tennessee Titans": "ten",
      "Washington Commanders": "wsh"
    };

    const colorMap = {
      "Arizona Cardinals": "#97233F",
      "Atlanta Falcons": "#A71930",
      "Baltimore Ravens": "#241773",
      "Buffalo Bills": "#00338D",
      "Carolina Panthers": "#0085CA",
      "Chicago Bears": "#0B162A",
      "Cincinnati Bengals": "#FB4F14",
      "Cleveland Browns": "#311D00",
      "Dallas Cowboys": "#003594",
      "Denver Broncos": "#FB4F14",
      "Detroit Lions": "#0076B6",
      "Green Bay Packers": "#203731",
      "Houston Texans": "#03202F",
      "Indianapolis Colts": "#002C5F",
      "Jacksonville Jaguars": "#006778",
      "Kansas City Chiefs": "#E31837",
      "Las Vegas Raiders": "#000000",
      "Los Angeles Chargers": "#0080C6",
      "Los Angeles Rams": "#003594",
      "Miami Dolphins": "#008E97",
      "Minnesota Vikings": "#4F2683",
      "New England Patriots": "#002244",
      "New Orleans Saints": "#101820",
      "New York Giants": "#0B2265",
      "New York Jets": "#125740",
      "Philadelphia Eagles": "#004C54",
      "Pittsburgh Steelers": "#101820",
      "San Francisco 49ers": "#AA0000",
      "Seattle Seahawks": "#002244",
      "Tampa Bay Buccaneers": "#D50A0A",
      "Tennessee Titans": "#0C2340",
      "Washington Commanders": "#5A1414"
    };

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      const bigint = parseInt(clean, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function getTextColor(hex) {
      const { r, g, b } = hexToRgb(hex);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      return brightness > 140 ? "#000000" : "#FFFFFF";
    }

    let lastStatus = "onClock";

    function applyState(team, status) {
      if (status === "onClock") {
        statusInner.textContent = "ON THE CLOCK";
        widget.classList.remove("pick-in-flash");
      } else {
        statusInner.textContent = "THE PICK IS IN";
        if (lastStatus !== "picked") {
          widget.classList.remove("pick-in-flash");
          void widget.offsetWidth;
          widget.classList.add("pick-in-flash");
        }
      }

      const code = logoMap[team] || "lv";
      teamLogo.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${code}.png`;
      teamLogo.alt = `${team} logo`;

      const color = colorMap[team] || "#000000";
      const textColor = getTextColor(color);

      statusText.style.backgroundColor = color;
      logoBox.style.backgroundColor = color;
      statusText.style.color = textColor;

      lastStatus = status;
    }

    applyState("Denver Broncos", "onClock");

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      applyState(data.team || "Denver Broncos", data.status || "onClock");
    };

    ws.onerror = () => {
      console.log("WebSocket error; showing default state.");
    };
  </script>
</body>
</html>
